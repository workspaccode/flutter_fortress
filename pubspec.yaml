name: flutter_fortress
description: "Production-ready Runtime Application Self-Protection (RASP) for Flutter. SSL pinning, root/jailbreak detection, anti-Frida, anti-screenshot, and tamper detection."
version: 0.1.0
homepage: https://github.com/example/flutter_fortress
repository: https://github.com/example/flutter_fortress
issue_tracker: https://github.com/workspaccode/flutter_fortress/issues
topics:
  - security
  - rasp
  - flutter-security
  - ssl-pinning
  - anti-tamper

environment:
  sdk: ^3.12.1
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2
  dio: ^5.4.0
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.example.flutter_fortress
        pluginClass: FlutterFortressPlugin
      ios:
        pluginClass: FlutterFortressPlugin
